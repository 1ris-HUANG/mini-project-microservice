apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app-deployment
spec:
  replicas: 3          # 副本数，老师会看你是否理解微服务的高可用
  selector:
    matchLabels:
      app: my-python-app
  template:
    metadata:
      labels:
        app: my-python-app
    spec:
      containers:
      - name: python-container
        # 填Docker Hub 上的完整镜像名和标签
        image: joycookie/python-service:v2 
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: python-app-service
spec:
  selector:
    app: my-python-app
  ports:
    - protocol: TCP
      port: 80         # 外部访问端口
      targetPort: 5000 # 映射到容器里的端口
  type: NodePort       # 在本地 Minikube 最通用的暴露方式